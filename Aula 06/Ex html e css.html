<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS moderno</title>
</head>
<style>
    body {
        background-color: #D3D3D3;
        background-color: url('Fundo bob.jpg');
        font-family: Arial, sans-serif;
    }

    .texto-azul {
        color: rgb(0, 11, 128); /*Regra específica solicitada */
        font-size: 24px;
        font-weight: bold;
    }

    table {
        border: 2px solid black;
        border-collapse: collapse; /* Unindo as bordas */
        width: 50%;
        margin: 0 auto;
    }

    table td {
        border: 1px solid black; /* Bordas ficam juntas pelo collapse */
        padding: 10px;
        text-align: center;
    }

    img {
        border: 3px solid #000;
    }

    /* Simulação moderna do char/charoff para números */
    .coluna-numerica {
        text-align: right;
        font-family: 'Courier New', monospace;
    }
</style>

<body>
    <div style="text-align: center;">
        <p class="texto-azul">Status do personagem: Patrick burro</p>

        <table>
            <tr>
                <td colspan="2">
                    <span class="texto-azul">Inteligência nível 0</span>
                </td>
            </tr>
            <tr>
                <td align="center">
                    <img src="Patrick.png" border="3" alt="Avatar">
                </td>
                <td align="char" char=".">
                    Burríce: 67³
                    Reflexos: -2
                    Vantagens: "Aura" nível 30, "felicidade" nível 35, "baba intoxicante" nível 67.
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
