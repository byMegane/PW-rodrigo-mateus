<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS moderno</title>
</head>
<style>
    body {
        background-color: #D3D3D3;
        background-image: url('Fundo bob.jpg');
        font-family: Arial, sans-serif;

        /*Pesquisei esses itens:*/
        background-size: cover;    /* Faz a imagem esticar/encolher para cobrir tudo */
        background-repeat: no-repeat; /* Impede que ela fique se repetindo em mosaico */
        background-position: center;  /* Centraliza a imagem no fundo */
        background-attachment: fixed; /* Opcional: o fundo fica parado enquanto você rola a página / que por sinal sem esse codigo a imagem de fundo não preenche toda a tela*/
        margin: 0; /* Remove espaços em branco nas bordas da página */
        padding: 0;
    }

    .texto-azul {
        color: rgb(0, 11, 128); /*Regra específica solicitada */
        font-size: 24px;
        font-weight: bold;
    }

    table {
        border: 2px solid black;
        border-collapse: collapse; /* Unindo as bordas */
        width: 50%;
        margin: 0 auto;
    }

    table td {
        border: 1px solid black; /* Bordas ficam juntas pelo collapse */
        padding: 10px;
        text-align: center;
    }

    img {
        border: 3px solid #000;
        max-width: 250px;
        height: auto;
    }

    /* Simulação moderna do char/charoff para números */
    .coluna-numerica {
        text-align: right;
        font-family: 'Courier New', monospace;
    }

    .vantagens {
        font-size: 24px;
        font-weight: bold;
        color: rgb(56, 59, 250);
    }
</style>

<body>
    <div style="text-align: center;">
        <p class="texto-azul">Status do personagem: Patrick burro</p>

        <table>
            <tr>
                <td colspan="2">
                    <span class="texto-azul">Inteligência nível 0</span>
                </td>
            </tr>
            <tr>
                <td align="center">
                    <img src="Patrick.png" border="3" alt="Avatar">
                </td>
                <td align="char" char=".">
                    Burríce: 67³ <br>
                    Reflexos: -2 <br>
                    <p class="vantagens">Vantagens:</p>
                    "Aura" nível 30 <br> "felicidade" nível 35 <br> "baba intoxicante" nível 67.
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
